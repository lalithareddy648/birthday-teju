<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Teju 🥰</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: monospace;
  background: linear-gradient(135deg,#ffb6ec,#c8a2ff,#a0e7ff);
  text-align: center;
  color: white;
}

/* Glowing Heading */
h1 {
  margin-top: 40px;
  font-size: 40px;
  text-shadow: 0 0 15px pink, 0 0 30px violet, 0 0 50px white;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 15px pink; }
  to { text-shadow: 0 0 40px violet, 0 0 60px white; }
}

/* Flower Animation */
.flower {
  position: absolute;
  font-size: 30px;
  animation: bloom 1s ease-out forwards;
}

@keyframes bloom {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1.6); opacity: 1; }
}

/* Hacker Screen */
#hackerScreen {
  display: none;
  background: black;
  color: #00ff99;
  height: 100vh;
  padding: 80px 20px;
  font-size: 18px;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff99;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { background: transparent; }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background-color: red;
  top: 0;
  pointer-events: none;
  opacity: 0.9;
  z-index: 9999;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<h1 id="title">Tap 5 Times to Unlock Something Special 🌸</h1>

<div id="hackerScreen">
  <div id="text"></div><span class="cursor"></span>
</div>

<script>
let tapCount = 0;

document.addEventListener("click", function(e) {
  // Flower animation
  if (tapCount < 5) {
    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = e.clientX + "px";
    flower.style.top = e.clientY + "px";
    document.body.appendChild(flower);
    setTimeout(() => flower.remove(), 2000);
  }

  tapCount++;

  if (tapCount === 5) {
    // Hide title and show hacker screen
    document.body.style.background = "black";
    document.getElementById("title").style.display = "none";
    document.getElementById("hackerScreen").style.display = "block";

    // Start typing messages
    startTyping();
  }
});

// Hacker screen messages
let messages = [
"> Accessing Special Person Database...",
"> Loading Profile: Teju 🥰",
"> Role: My Support System 💖",
"> Status: Teaches Me New Things Everyday 📚",
"> Strength: Supports Me In Every Situation 🤝",
"> Final Message Incoming...",
"> 🎉 HAPPY BIRTHDAY TEJU 🎉",
"> You are one of the strongest and kindest people I know.",
"> Thank you for always guiding and supporting me.",
"> I’m lucky to have you in my life 💖✨",
"> — From your lovely Pandhi 🥰"
];

let i = 0;
let j = 0;

function startTyping() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i].charAt(j);
      j++;
      setTimeout(startTyping, 40);
    } else {
      document.getElementById("text").innerHTML += "<br>";
      j = 0;
      i++;
      setTimeout(startTyping, 500);
    }
  } else {
    // When all messages are done, trigger confetti
    launchConfetti();
  }
}

// Confetti effect
function launchConfetti() {
  const colors = ["#ff0a54","#ff477e","#ff7096","#ff85a1","#fbb1b1","#f9bec7","#f7cad0"];
  for(let i=0; i<150; i++) {
    let confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.animationDuration = 2 + Math.random() * 2 + "s";
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }
}
</script>

</body>
</html>
