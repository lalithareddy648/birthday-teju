<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Teju</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
            text-align: center;
        }

        h1 {
            font-size: 50px;
            color: white;
            text-shadow: 
                0 0 10px #fff,
                0 0 20px #ff4da6,
                0 0 30px #ff4da6,
                0 0 40px #ff1a75;
            animation: glow 1.5s infinite alternate;
        }

        p {
            font-size: 20px;
            color: white;
        }

        @keyframes glow {
            from {
                text-shadow: 
                    0 0 10px #fff,
                    0 0 20px #ff4da6,
                    0 0 30px #ff4da6;
            }
            to {
                text-shadow: 
                    0 0 20px #fff,
                    0 0 30px #ff1a75,
                    0 0 40px #ff1a75;
            }
        }

        .button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background-color: white;
            color: #ff4da6;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .button:hover {
            background-color: #ff4da6;
            color: white;
        }
    </style>
</head>
<body>

    <div>
        <h1>Happy Birthday Teju 💖</h1>
        <p>
            You are the person who teaches me new things ✨<br>
            You support me in all situations 🤍<br><br>
            Thank you for being my strength 🌸<br><br>
            — From your lovely Pandhi 🐼💌
        </p>

        <button class="button" onclick="playMusic()">Click Here for Surprise 🎵</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="sitaramam.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            document.getElementById("bgMusic").play();
            alert("Surprise 🎉💖 Close this and enjoy the music!");
        }
    </script>

</body>
</html>
